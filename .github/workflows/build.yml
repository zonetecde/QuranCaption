name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description:
          'Release tag (e.g. QC-3.4.0). Must match the version in tauri.conf.json (without "v"
          prefix).'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release?'
        required: false
        default: false
        type: boolean
      draft:
        description: 'Create as draft release?'
        required: false
        default: true
        type: boolean

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin --bundles app,dmg'
            assetNamePattern: 'QuranCaption.MacOS.ARM[ext]'
          - os: macos-15-intel
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin --bundles app,dmg'
            assetNamePattern: 'QuranCaption.MacOS.Intel[ext]'
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            args: '--bundles nsis'
            assetNamePattern: 'QuranCaption.Windows[ext]'
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            args: '--bundles appimage,deb'
            assetNamePattern: 'QuranCaption.Linux[ext]'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Set up build environment variables for faster builds
      - name: Configure build environment
        run: |
          echo "CARGO_BUILD_JOBS=2" >> $GITHUB_ENV
          echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> $GITHUB_ENV
        shell: bash

      # ─── macOS binary setup ───
      - name: Download yt-dlp (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          curl -L -o yt-dlp https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos
          chmod +x yt-dlp
          mkdir -p src-tauri/binaries
          mv yt-dlp src-tauri/binaries/yt-dlp

      - name: Install ffmpeg and copy binaries (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew update
          brew install ffmpeg-full
          mkdir -p src-tauri/binaries
          cp "$(brew --prefix ffmpeg-full)/bin/ffprobe" src-tauri/binaries/ffprobe
          cp "$(brew --prefix ffmpeg-full)/bin/ffmpeg" src-tauri/binaries/ffmpeg
          chmod +x src-tauri/binaries/ffprobe
          chmod +x src-tauri/binaries/ffmpeg
          if src-tauri/binaries/ffmpeg -hide_banner -filters | grep -qi xfade_vulkan; then
            echo "xfade_vulkan available in macOS FFmpeg build"
          else
            echo "xfade_vulkan unavailable in macOS FFmpeg build; CPU fallback will be used"
          fi

      # ─── Windows binary setup ───
      - name: Download yt-dlp (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path src-tauri/binaries -Force | Out-Null
          curl -L -o yt-dlp.exe https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
          Move-Item yt-dlp.exe src-tauri/binaries/yt-dlp.exe

      - name: Download and extract ffmpeg and ffprobe (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $binDir = "src-tauri/binaries"
          New-Item -ItemType Directory -Path $binDir -Force | Out-Null

          # Full build is required for Vulkan/OpenCL filters such as xfade_vulkan.
          $ffmpegArchive = "ffmpeg.7z"
          curl.exe -L -o $ffmpegArchive "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-full.7z"

          $extractDir = "ffmpeg-extracted"
          if (Test-Path $extractDir) { Remove-Item -Recurse -Force $extractDir }
          New-Item -ItemType Directory -Path $extractDir -Force | Out-Null

          $sevenZip = (Get-Command 7z -ErrorAction SilentlyContinue).Source
          if (-not $sevenZip) {
            curl.exe -L -o 7zr.exe "https://www.7-zip.org/a/7zr.exe"
            $sevenZip = (Resolve-Path ".\7zr.exe").Path
          }
          & $sevenZip x $ffmpegArchive "-o$extractDir" -y

          # Find extracted root (contains bin/ffmpeg.exe & bin/ffprobe.exe)
          $rootDir = Get-ChildItem -Directory -Path $extractDir | Select-Object -First 1
          Copy-Item -Path (Join-Path $rootDir.FullName "bin/ffmpeg.exe") -Destination $binDir -Force
          Copy-Item -Path (Join-Path $rootDir.FullName "bin/ffprobe.exe") -Destination $binDir -Force

          $filters = & (Join-Path $binDir "ffmpeg.exe") -hide_banner -filters
          if ($filters -notmatch "xfade_vulkan") {
            throw "Downloaded FFmpeg build does not include xfade_vulkan"
          }

      # ─── Linux binary setup ───
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # Base toolchain and deps for Tauri
          sudo apt-get install -y build-essential pkg-config file curl ca-certificates xz-utils
          # GTK/WebKit deps (try 4.1 first, fallback to 4.0)
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev
          # Additional dependencies for better Linux compatibility
          sudo apt-get install -y xdg-utils desktop-file-utils

      - name: Download yt-dlp (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          curl -L -o yt-dlp https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp
          chmod +x yt-dlp
          mkdir -p src-tauri/binaries
          mv yt-dlp src-tauri/binaries/yt-dlp

      - name: Download and extract ffmpeg and ffprobe (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o ffmpeg.tar.xz "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
          rm -rf ffmpeg-extracted
          mkdir ffmpeg-extracted
          tar -xJf ffmpeg.tar.xz -C ffmpeg-extracted
          rootdir=$(find ffmpeg-extracted -maxdepth 1 -mindepth 1 -type d | head -n 1)
          cp "$rootdir/ffmpeg" src-tauri/binaries/ffmpeg
          cp "$rootdir/ffprobe" src-tauri/binaries/ffprobe
          chmod +x src-tauri/binaries/ffmpeg src-tauri/binaries/ffprobe
          if ! src-tauri/binaries/ffmpeg -hide_banner -filters | grep -qi xfade_vulkan; then
            echo "Downloaded FFmpeg build does not include xfade_vulkan"
            exit 1
          fi

      # ─── Build & Release with tauri-action ───
      - name: Install app dependencies
        run: npm install

      - name: Build and create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
          PUBLIC_POSTHOG_HOST: ${{ secrets.PUBLIC_POSTHOG_HOST }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: 'Quran Caption ${{ inputs.tag }}'
          releaseBody: 'See the changelog below for details.'
          releaseDraft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          args: ${{ matrix.args }}
          assetNamePattern: ${{ matrix.assetNamePattern }}
        timeout-minutes: 60
